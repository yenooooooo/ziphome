<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Maskable 아이콘 — 중앙 80% 영역만 콘텐츠 (safe zone 준수) -->
  <defs>
    <linearGradient id="bg-mask" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
  </defs>
  <!-- 전체 배경 (마스킹될 영역 포함) -->
  <rect width="512" height="512" fill="url(#bg-mask)"/>
  <!-- Safe zone 기준: 중앙 409x409 내에만 중요 요소 배치 -->
  <g transform="translate(256 256)">
    <!-- 방패 (축소) -->
    <path d="M0 -100 L85 -70 L85 30 Q85 90 0 120 Q-85 90 -85 30 L-85 -70 Z"
          fill="#ffffff" fill-opacity="0.2"/>
    <!-- 집 -->
    <path d="M-55 -20 L0 -70 L55 -20 L55 45 L-55 45 Z"
          fill="#ffffff"/>
    <!-- 문 -->
    <rect x="-12" y="5" width="24" height="40" fill="#1D4ED8" rx="2"/>
  </g>
</svg>
